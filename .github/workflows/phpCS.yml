name: PHP Code Style

on: [push, workflow_dispatch]

jobs:
    phpcs:
        name: PHP CodeSniffer
        runs-on: ubuntu-slim
        steps:
            - uses: actions/checkout@v7

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                php-version: '8.3'
                tools: cs2pr,phpcs,composer

            - name: retrieve script
              run: wget https://raw.githubusercontent.com/splitbrain/dokuwiki-travis/master/travis.sh

            - name: Install DokuWiki
              env:
                  CI_SERVER: 1
                  DOKUWIKI : master
              run: sh travis.sh

#            - name: run PHP codesniffer
#              run: php phpcs -v --runtime-set ignore_warnings_on_exit true --standard=_test/phpcs.xml lib/plugins/backlinks
#            - name: run PHP codesniffer
#              run: phpcs --standard=_test/phpcs.xml --standard=_test/phpcs_MigrationAdjustments.xml --report=checkstyle --runtime-set ignore_warnings_on_exit ./lib/plugins/backlinks | cs2pr

            - name: run PHP codesniffer
              run: |
                cd _test
                composer install --no-interaction --no-progress --no-suggest --prefer-dist
                phpcs --standard=./phpcs.xml,./phpcs_MigrationAdjustments.xml --report=checkstyle --runtime-set ignore_warnings_on_exit ../lib/plugins/backlinks | cs2pr